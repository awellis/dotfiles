[metadata]
name = "zoxide"
description = "Jump to a directory from zoxide's frecency database"
requirements = ["zoxide"]

[source]
command = "zoxide query -l"

[preview]
# Falls back to ls if eza isn't available.
command = "eza -la --color=always --icons --group-directories-first {} 2>/dev/null || ls -la {}"
env = { CLICOLOR_FORCE = "1" }

[ui]
[ui.preview_panel]
size = 60
