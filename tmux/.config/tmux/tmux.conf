# -- General --
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
set -g focus-events on
set -g set-clipboard on

# -- Prefix --
# Use Ctrl-b (default), same as your Zellij tmux mode
set -g prefix C-b

# -- Vi mode --
setw -g mode-keys vi

# -- Pane navigation (Alt+h/j/k/l, matching your Zellij muscle memory) --
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# -- Pane splitting --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# -- Pane resizing --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- Window navigation --
bind -n M-[ previous-window
bind -n M-] next-window

# -- New windows/panes keep cwd --
bind c new-window -c "#{pane_current_path}"

# -- Reload config --
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# -- Close pane (x, matching Zellij) --
bind x kill-pane

# -- Theme (Tokyo Night Storm to match your Zellij) --
set -g status-style "bg=#1f2335,fg=#c0caf5"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#7aa2f7,fg=#1f2335"
set -g status-left "#[bg=#7aa2f7,fg=#1f2335,bold] #S #[default] "
set -g status-right "#[fg=#c0caf5] %H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#3b4261,fg=#c0caf5,bold] #I:#W "
